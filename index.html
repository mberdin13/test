<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Verification Screen -->
    <div id="verifyScreen">
        <div class="verify-box">
            <label>
                <input type="checkbox" id="verifyCheck">
                <span>I am not a robot</span>
            </label>

            <div class="verify-footer">
                Verification
            </div>
        </div>
    </div>

    <!-- Animated Image -->
    <div id="imageContainer">
        <img
            id="animatedImage"
            src="assets/imgs/img-1.png"
            alt="Jumpscare Image"
        >
    </div>

    <!-- Audio -->
    <audio id="bgSound" loop>
        <source src="assets/audio/scream.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
